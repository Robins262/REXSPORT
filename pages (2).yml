media:
  input: "imagenes"
  output: "imagenes"

content:
  - name: productos
    label: "Mis Productos"
    type: file
    path: "productos.json"
    format: json
    list: true
    fields:
      - { name: id, label: "ID Único (Número)", type: number }
      - { name: nombre, label: "Nombre de la Gelatina", type: string }
      - { name: categoria, label: "Categoría (DULCE / CREMOSO / CITRICO)", type: string }
      - { name: descripcion, label: "Descripción", type: text }
      - { name: precio, label: "Precio de Venta (S/)", type: number }
      - { name: descuento, label: "Precio Normal/Descuento (S/)", type: number }
      - { name: imagen, label: "Foto de la Gelatina", type: image }
